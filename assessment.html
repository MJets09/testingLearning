<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessment</title>
</head>

<body>
    <form action="#">
        <label for="userID">UserID:</label>
        <input type="text" name="userID" id="userID" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{12,}" title="The UserID must contain an uppercase, a lowercase, a number, and be 8 to 12 chars long.">
        <p>UserID must contain an uppercase, a lowercase, a number, and be 8 to 12 chars long.</p>
        <label for="fname">First Name:</label>
        <input type="text" name="fname" id="fname">
        <br>
        <label for="lname">Last Name:</label>
        <input type="text" name="lname" id="lname">
        <br>
        <label for="bday">Birthday:</label>
        <input type="date" name="bday" id="bday">
        <br>
    </form>
    <button id="submitt">Accept</button>
    <button id="testing"></button>
    <p id="star"></p>
    <p id="message"></p>

    <script src="./assess.js"></script>
</body>

</html>
